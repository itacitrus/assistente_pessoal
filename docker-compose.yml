services:
  bot:
    build: ./bot
    container_name: assistente-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      transcription:
        condition: service_healthy
    environment:
      - TRANSCRIPTION_URL=http://transcription:8000
    ports:
      - "0.0.0.0:8080:8080"
    working_dir: /app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  transcription:
    build: ./transcription
    container_name: assistente-transcription
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Painel Zello (Next.js standalone). Self-host no EC2; o ALB roteia
  # zello.chat -> este container (:3001 no host). NEXT_PUBLIC_API_BASE_URL e
  # build-arg (embutido no bundle) — aponta pra api.zello.chat (-> bot:8080).
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_API_BASE_URL:-https://api.zello.chat}
    container_name: zello-web
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

